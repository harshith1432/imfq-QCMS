<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Directory | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content">
                <div class="content-header fade-in">
                    <div class="d-flex justify-content-between align-items-end w-100">
                        <div>
                            <h1 class="page-heading">Organization Directory</h1>
                            <p class="page-description">Manage user roles, departments, and system access across the organization.</p>
                        </div>
                    <div class="header-actions">
                        <div class="ds-search-box">
                            <i data-lucide="search"></i>
                            <input type="text" class="ds-input" placeholder="Find member..." id="userSearch">
                        </div>
                        <button class="ds-btn ds-btn-primary" style="height: 44px;" onclick="Users.openAddModal()">
                            <i data-lucide="user-plus"></i> Add Stakeholder
                        </button>
                    </div>
                    </div>
                </div>

                <div class="ds-card mt-4 fade-in">
                    <div class="ds-card-header bg-white border-0">
                        <div class="ds-tab-group">
                            <button class="ds-btn-tab active" onclick="Users.filter('all')">All Stakeholders</button>
                            <button class="ds-btn-tab" onclick="Users.filter('active')">Active Members</button>
                        </div>
                    </div>
                    <div class="ds-card-body p-0">
                        <table class="ds-table">
                            <thead>
                                <tr>
                                    <th>Identity</th>
                                    <th>Assigned Role</th>
                                    <th>Department</th>
                                    <th>System Status</th>
                                    <th>Last Synchronized</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <!-- Loaded via script -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- User Action Dropdown Menu Template -->
    <div id="actionMenuTemplate" class="d-none">
        <ul class="dropdown-menu shadow-sm">
            <li><a class="dropdown-item" href="#" onclick="Users.edit(USER_ID)"><i data-lucide="edit-2"></i> Edit Member</a></li>
            <li><a class="dropdown-item" href="#" onclick="Users.reassign(USER_ID)"><i data-lucide="refresh-cw"></i> Reassign Dept</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="Users.archive(USER_ID)"><i data-lucide="trash-2"></i> Archive User</a></li>
        </ul>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Provision Access</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form id="userForm">
                        <div class="ds-field">
                            <label class="ds-label text-xs fw-bold text-uppercase opacity-75">Display Name / Identity</label>
                            <input type="text" class="ds-input" id="username" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label text-xs fw-bold text-uppercase opacity-75">Enterprise Email</label>
                            <input type="email" class="ds-input" id="email" placeholder="john@company.com" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="ds-field">
                                    <label class="ds-label text-xs fw-bold text-uppercase opacity-75">Organizational Role</label>
                                    <select class="ds-input ds-select" id="role">
                                        <option value="Team Member">Team Member</option>
                                        <option value="Team Leader">Team Leader</option>
                                        <option value="Facilitator">Facilitator</option>
                                        <option value="Reviewer">Reviewer</option>
                                        <option value="Admin">Admin</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="ds-field">
                                    <label class="ds-label text-xs fw-bold text-uppercase opacity-75">Department</label>
                                    <select class="ds-input ds-select" id="department">
                                         <option value="Manufacturing">Manufacturing</option>
                                         <option value="Quality Control">Quality Control</option>
                                         <option value="Maintenance">Maintenance</option>
                                         <option value="Operations">Operations</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label text-xs fw-bold text-uppercase opacity-75">Temporary Password</label>
                            <input type="text" class="ds-input" id="password" placeholder="Set initial password (e.g. Welcome@123)" value="QCMS@123">
                            <small class="text-muted text-xs">User will be required to change this upon first login.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="ds-btn ds-btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button class="ds-btn ds-btn-primary px-4" onclick="Users.save()">Confirm Provisioning</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const Users = {
            currentFilter: 'all',
            editingUserId: null,
            modalMode: 'ADD', // ADD, EDIT, REASSIGN

            async init() {
                try {
                    if (typeof QCMS !== 'undefined') QCMS.init();
                    this.loadUsers();
                } catch (e) { console.error('Init failed:', e); }
            },

            async loadUsers() {
                try {
                    const allUsers = await api.get('/admin/users');
                    
                    // Filter logic
                    const filtered = allUsers.filter(u => {
                        if (this.currentFilter === 'active') return u.is_active;
                        return true;
                    });

                    const tbody = document.getElementById('usersBody');
                    if (filtered.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="text-center p-5 text-muted">No ${this.currentFilter} members found.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = filtered.map(u => `
                        <tr class="fade-in">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="user-avatar" style="width:32px; height:32px; font-size:0.75rem; background: ${this.getAvatarColor(u.username)}">${u.username.substring(0,2).toUpperCase()}</div>
                                    <div>
                                        <div class="fw-bold text-sm text-slate-900">${u.username}</div>
                                        <div class="text-xs text-muted">${u.email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${this.roleBadge(u.role)}</td>
                            <td><span class="text-sm fw-medium">${u.department}</span></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="ds-badge-dot ${u.is_active ? 'green' : 'gray'}"></span>
                                    <span class="text-xs fw-medium">${u.is_active ? 'Active' : 'Deactivated'}</span>
                                </div>
                            </td>
                            <td><span class="text-xs text-muted">${u.last_active ? QCMS.formatRelative(u.last_active) : 'Never'}</span></td>
                            <td class="text-end">
                                <div class="dropdown">
                                    <button class="nav-icon-btn" data-bs-toggle="dropdown" data-bs-boundary="viewport" style="width:32px; height:32px;">
                                        <i data-lucide="more-vertical" style="width:16px;"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-light">
                                        <li><a class="dropdown-item" href="#" onclick="Users.edit(${u.id})"><i data-lucide="edit-2" class="me-2" style="width:14px;"></i> Edit Member</a></li>
                                        <li><a class="dropdown-item" href="#" onclick="Users.reassign(${u.id})"><i data-lucide="refresh-cw" class="me-2" style="width:14px;"></i> Reassign Dept</a></li>
                                        <li><hr class="dropdown-divider"></li>
                                        <li><a class="dropdown-item text-danger" href="#" onclick="Users.archive(${u.id})"><i data-lucide="trash-2" class="me-2" style="width:14px;"></i> ${u.is_active ? 'Deactivate' : 'Activate'} User</a></li>
                                    </ul>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                    
                    if (window.lucide) lucide.createIcons();
                } catch (e) {
                    console.error('Failed to load users:', e);
                    QCMS.toast('Failed to load users from server', 'error');
                }
            },

            filter(type) {
                this.currentFilter = type;
                document.querySelectorAll('.ds-btn-tab').forEach(btn => {
                    const btnType = btn.getAttribute('onclick').includes(`'${type}'`);
                    btn.classList.toggle('active', btnType);
                });
                this.loadUsers();
            },

            getAvatarColor(name) {
                const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
                const index = (name || 'U').charCodeAt(0) % colors.length;
                return colors[index];
            },

            roleBadge(role) {
                const colors = {
                    'Admin': 'red',
                    'Team Leader': 'blue',
                    'Facilitator': 'purple',
                    'Reviewer': 'cyan',
                    'Team Member': 'gray'
                };
                const color = colors[role] || 'gray';
                return `<span class="ds-badge ${color}">${role}</span>`;
            },

            openAddModal() {
                this.editingUserId = null;
                this.modalMode = 'ADD';
                document.getElementById('userForm').reset();
                document.getElementById('password').value = 'QCMS@123';
                document.querySelector('#userModal .modal-title').textContent = 'Provision Access';
                document.querySelector('#userModal .ds-btn-primary').textContent = 'Confirm Provisioning';
                
                // Enable all fields
                document.getElementById('username').disabled = false;
                document.getElementById('email').disabled = false;
                
                new bootstrap.Modal(document.getElementById('userModal')).show();
            },

            async edit(id) { 
                try {
                    this.editingUserId = id;
                    this.modalMode = 'EDIT';
                    QCMS.toast('Fetching stakeholder details...', 'info');
                    
                    const user = await api.get(`/admin/users/${id}`);
                    
                    document.getElementById('username').value = user.username;
                    document.getElementById('email').value = user.email;
                    document.getElementById('role').value = user.role;
                    document.getElementById('department').value = user.department;
                    document.getElementById('password').value = ''; // Don't show password, but allow reset
                    
                    // Enable fields for full edit
                    document.getElementById('username').disabled = false;
                    document.getElementById('email').disabled = false;
                    
                    document.querySelector('#userModal .modal-title').textContent = 'Edit Stakeholder';
                    document.querySelector('#userModal .ds-btn-primary').textContent = 'Save Changes';
                    
                    new bootstrap.Modal(document.getElementById('userModal')).show();
                } catch (e) {
                    QCMS.toast('Failed to load user details', 'error');
                }
            },

            async reassign(id) { 
                try {
                    this.editingUserId = id;
                    this.modalMode = 'REASSIGN';
                    QCMS.toast('Opening reassignment workflow...', 'info');
                    
                    const user = await api.get(`/admin/users/${id}`);
                    
                    document.getElementById('username').value = user.username;
                    document.getElementById('email').value = user.email;
                    document.getElementById('role').value = user.role;
                    document.getElementById('department').value = user.department;
                    document.getElementById('password').value = '';
                    
                    // Disable core identity fields for reassignment
                    document.getElementById('username').disabled = true;
                    document.getElementById('email').disabled = true;
                    
                    document.querySelector('#userModal .modal-title').textContent = 'Reassign Department';
                    document.querySelector('#userModal .ds-btn-primary').textContent = 'Update Assignment';
                    
                    new bootstrap.Modal(document.getElementById('userModal')).show();
                    
                    // Focus department select
                    setTimeout(() => document.getElementById('department').focus(), 500);
                } catch (e) {
                    QCMS.toast('Failed to load user details', 'error');
                }
            },

            async save() {
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const role = document.getElementById('role').value;
                const department = document.getElementById('department').value;
                const password = document.getElementById('password').value;
                
                if (!username || !email) {
                    return QCMS.toast('Please enter name and email', 'warning');
                }

                try {
                    const payload = { role, department };
                    if (this.modalMode !== 'REASSIGN') {
                        payload.username = username;
                        payload.email = email;
                    }
                    if (password) payload.password = password;

                    if (this.editingUserId) {
                        QCMS.toast('Updating stakeholder...', 'info');
                        await api.put(`/admin/users/${this.editingUserId}`, payload);
                        QCMS.toast('Stakeholder updated successfully', 'success');
                    } else {
                        QCMS.toast('Provisioning stakeholder...', 'info');
                        // For new users, ensure we have a password
                        payload.password = password || 'QCMS@123';
                        await api.post('/auth/register', payload);
                        QCMS.toast('Stakeholder provisioned successfully', 'success');
                    }

                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    document.getElementById('userForm').reset();
                    this.loadUsers();
                } catch (e) {
                    console.error('Operation failed:', e);
                    QCMS.toast(e.message || 'Operation failed', 'error');
                }
            },

            async archive(id) { 
                if (!confirm('Are you sure about this status change?')) return;
                try {
                    // Fetch existing state first
                    const allUsers = await api.get('/admin/users');
                    const user = allUsers.find(u => u.id === id);
                    await api.put(`/admin/users/${id}`, { is_active: !user.is_active });
                    QCMS.toast(`User status updated successfully`, 'success');
                    this.loadUsers();
                } catch (e) {
                    QCMS.toast('Operation failed', 'error');
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => Users.init());
    </script>
</body>
</html>
