<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Repository | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="assets/js/ux/breadcrumbs.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .stalled-row { background: rgba(239, 68, 68, 0.05) !important; border-left: 3px solid #ef4444 !important; }
        .stalled-badge { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-left: 8px; border: 1px solid rgba(239, 68, 68, 0.2); }
        .efficiency-progress { height: 6px; background: rgba(var(--ds-primary-rgb), 0.05); border-radius: 3px; overflow: hidden; margin-top: 4px; width: 100px; }
        .efficiency-fill { height: 100%; background: var(--ds-accent); }
        .ds-label { font-size: 12px !important; letter-spacing: 0.02em !important; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content-inner">
                <header class="ds-header-layout section-spacing px-0">
                    <div class="h-stack justify-content-between w-100">
                        <div class="v-stack">
                            <h1 class="ds-title mb-0">Project Repository</h1>
                            <p class="ds-text-secondary mb-0">Real-time database of all QCMS initiatives. Monitor progress, efficiency, and identify stalled projects across the organization.</p>
                        </div>
                    </div>
                </header>

                <!-- Summary Stats Section -->
                <div class="row g-4 mb-4" id="repoStats">
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Filters & Search -->
                <div class="glass-card mb-4 fade-in">
                    <div class="ds-card-body p-4">
                        <div class="row g-4 align-items-end">

                            <div class="col-lg-2 col-md-4">
                                <label class="ds-label mb-2">
                                    <i data-lucide="building-2"></i> DEPARTMENT
                                </label>
                                <select class="ds-input ds-select" id="deptFilter">
                                    <option value="">All Departments</option>
                                </select>
                            </div>
                            <div class="col-lg-2 col-md-4">
                                <label class="ds-label mb-2">
                                    <i data-lucide="activity"></i> STATUS
                                </label>
                                <select class="ds-input ds-select" id="statusFilter">
                                    <option value="">All Status</option>
                                    <option value="Active">Active</option>
                                    <option value="Closed">Completed</option>
                                    <option value="Pending Approval">Pending Approval</option>
                                    <option value="On Hold">On Hold</option>
                                </select>
                            </div>
                            <div class="col-lg-2 col-md-4">
                                <label class="ds-label mb-2">
                                    <i data-lucide="layers"></i> STAGE
                                </label>
                                <select class="ds-input ds-select" id="stageFilter">
                                    <option value="">All Stages</option>
                                    <option value="1">Stage 1: Identification</option>
                                    <option value="2">Stage 2: Selection</option>
                                    <option value="3">Stage 3: Analysis</option>
                                    <option value="4">Stage 4: Causes</option>
                                    <option value="5">Stage 5: Root Cause</option>
                                    <option value="6">Stage 6: Data Analysis</option>
                                    <option value="7">Stage 7: Development</option>
                                    <option value="8">Stage 8: Implementation</option>
                                </select>
                            </div>
                            <div class="col-lg-2 col-md-12">
                                <button class="ds-btn ds-btn-primary w-100" onclick="repoUI.loadData()">
                                    <i data-lucide="refresh-cw"></i> Sync Data
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Projects Master Table -->
                <div class="ds-card fade-in">
                    <div class="ds-card-body p-0">
                        <div class="table-responsive">
                            <table class="ds-table ds-table-hover">
                                <thead>
                                    <tr>
                                        <th>Project Identity</th>
                                        <th>Leader / Team</th>
                                        <th>Current progress</th>
                                        <th>Efficiency</th>
                                        <th>Last Update</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="repoTableBody">
                                    <script>
                                        document.write(QCMS.tableSkeleton(8));
                                    </script>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
    const repoUI = {
        data: [],
        isAdmin: false,

        async init() {
            QCMS.init();
            const searchInput = document.getElementById('globalSearchInput');
            if (searchInput) {
                searchInput.placeholder = "Search projects...";
            }

            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            this.isAdmin = (user.role || '').toLowerCase() === 'admin';
            
            await this.loadDepartments();
            await this.loadData();
            
            // Set up auto-refresh
            this.setupFilterListeners();
        },

        async loadDepartments() {
            try {
                const depts = await api.get('/admin/departments');
                const select = document.getElementById('deptFilter');
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Failed to load departments'); }
        },

        setupFilterListeners() {
            ['globalSearchInput', 'deptFilter', 'statusFilter', 'stageFilter'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (id === 'globalSearchInput') {
                    el.addEventListener('input', QCMS.debounce(() => this.loadData(), 400));
                } else {
                    el.addEventListener('change', () => this.loadData());
                }
            });
        },

        async loadData() {
            try {
                const filters = {
                    q: document.getElementById('globalSearchInput')?.value || '',
                    department_id: document.getElementById('deptFilter').value,
                    status: document.getElementById('statusFilter').value,
                    stage: document.getElementById('stageFilter').value
                };

                const res = await api.getRepositoryProjects(filters);
                this.data = res.projects;
                this.renderStats(res.stats);
                this.renderTable();
            } catch (e) {
                QCMS.toast('Failed to sync repository data', 'danger');
                document.getElementById('repoTableBody').innerHTML = 
                    `<tr><td colspan="6">${QCMS.emptyState('System Error', e.message, 'alert-circle')}</td></tr>`;
                if (window.lucide) lucide.createIcons();
            }
        },

        renderStats(stats) {
            const container = document.getElementById('repoStats');
            container.innerHTML = `
                <div class="col-md-3 col-sm-6">
                    ${QCMS.kpiCard('Total Projects', stats.total, 'layers', 'blue')}
                </div>
                <div class="col-md-3 col-sm-6">
                    ${QCMS.kpiCard('Active Apps', stats.active, 'activity', 'green')}
                </div>
                <div class="col-md-3 col-sm-6">
                    ${QCMS.kpiCard('Completed', stats.completed, 'check-circle', 'cyan')}
                </div>
                <div class="col-md-3 col-sm-6">
                    ${QCMS.kpiCard('Stalled', stats.stalled, 'clock', 'red')}
                </div>
            `;
            if (window.lucide) lucide.createIcons();
        },

        renderTable() {
            const body = document.getElementById('repoTableBody');
            const query = document.getElementById('globalSearchInput')?.value || '';
            
            if (!this.data.length) {
                if (query) {
                    body.innerHTML = `<tr><td colspan="6" class="text-center py-5">
                        ${QCMS.emptyState('No Results', `We couldn't find any projects matching "${query}"`, 'search-x')}
                    </td></tr>`;
                } else {
                    body.innerHTML = `<tr><td colspan="6" class="text-center py-5">
                        ${QCMS.emptyState('Archive Empty', 'No projects match your current filters.', 'layers')}
                    </td></tr>`;
                }
                if (window.lucide) lucide.createIcons();
                return;
            }

            body.innerHTML = this.data.map(p => `
                <tr class="${p.is_stalled ? 'stalled-row' : ''} fade-in">
                    <td>
                        <div class="v-stack">
                            <div class="h-stack gap-2 align-items-center mb-1">
                                <span class="fw-bold text-dark">${p.title}</span>
                                ${p.is_stalled ? '<span class="stalled-badge">Stalled</span>' : ''}
                            </div>
                            <div class="h-stack gap-2 align-items-center text-xs opacity-75">
                                <span class="fw-bold text-accent">${p.project_uid}</span>
                                <span class="text-muted">•</span>
                                ${QCMS.categoryBadge(p.category)}
                                <span class="text-muted">•</span>
                                <span class="text-muted">${p.department}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="text-sm fw-medium">${p.team_leader}</div>
                        <div class="text-xs text-muted">Facilitator / TL</div>
                    </td>
                    <td style="width:180px;">
                        ${QCMS.projectProgress(p.current_stage || 1, 8)}
                    </td>
                    <td>
                        <div class="text-sm fw-bold ${p.efficiency > 0 ? 'text-green' : 'text-muted'}">${p.efficiency}% Improvement</div>
                        <div class="efficiency-progress">
                            <div class="efficiency-fill" style="width: ${Math.min(p.efficiency, 100)}%"></div>
                        </div>
                    </td>
                    <td>
                        <div class="text-sm fw-medium">${QCMS.formatRelative(p.last_updated)}</div>
                        <div class="text-xs text-muted">Latest update</div>
                    </td>
                    <td class="text-end">
                        <div class="d-flex justify-content-end gap-1">
                            <a href="workspace.html?project=${p.id}" class="ds-btn ds-btn-xs ds-btn-ghost d-flex align-items-center gap-1" title="Continue Workflow">
                                <i data-lucide="play-circle" style="width:14px;"></i> Continue
                            </a>
                            <button class="ds-btn ds-btn-xs ds-btn-ghost d-flex align-items-center gap-1" onclick="window.location.href='analytics.html?project=${p.id}'" title="View Impact Report">
                                <i data-lucide="file-bar-chart" style="width:14px;"></i> Report
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }
    };

    document.addEventListener('DOMContentLoaded', () => repoUI.init());
    </script>
</body>
</html>
