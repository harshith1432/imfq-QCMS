<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Repository | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .stalled-row { background: rgba(239, 68, 68, 0.05) !important; border-left: 3px solid #ef4444 !important; }
        .stalled-badge { color: #ef4444; background: #fee2e2; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-left: 8px; }
        .efficiency-progress { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; margin-top: 4px; width: 100px; }
        .efficiency-fill { height: 100%; background: var(--ds-success); }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content">
                <div class="content-header fade-in">
                    <div>
                        <h1 class="page-heading">Project Repository</h1>
                        <p class="page-description">Real-time database of all QCMS initiatives. Monitor progress, efficiency, and identify stalled projects across the organization.</p>
                    </div>
                </div>

                <!-- Summary Stats Section -->
                <div class="row g-4 mb-4 fade-in" id="repoStats">
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="ds-card p-3 h-100 skeleton">
                            <div style="height: 100px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Filters & Search -->
                <div class="ds-card mb-4 fade-in">
                    <div class="ds-card-body p-4">
                        <div class="row g-4 d-flex align-items-end">
                            <div class="col-md-3">
                                <label class="ds-label mb-2">
                                    <i data-lucide="building-2"></i> DEPARTMENT
                                </label>
                                <select class="ds-input ds-select" id="deptFilter">
                                    <option value="">All Departments</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="ds-label mb-2">
                                    <i data-lucide="activity"></i> STATUS
                                </label>
                                <select class="ds-input ds-select" id="statusFilter">
                                    <option value="">All Status</option>
                                    <option value="Active">Active</option>
                                    <option value="Closed">Completed</option>
                                    <option value="Pending Approval">Pending Approval</option>
                                    <option value="On Hold">On Hold</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="ds-label mb-2">
                                    <i data-lucide="layers"></i> STAGE
                                </label>
                                <select class="ds-input ds-select" id="stageFilter">
                                    <option value="">All Stages</option>
                                    <option value="1">Stage 1: Identification</option>
                                    <option value="2">Stage 2: Observation</option>
                                    <option value="3">Stage 3: Analysis</option>
                                    <option value="4">Stage 4: Solutions</option>
                                    <option value="5">Stage 5: Approval</option>
                                    <option value="6">Stage 6: Execution</option>
                                    <option value="7">Stage 7: Review</option>
                                    <option value="8">Stage 8: Closure</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="ds-label mb-2">
                                    <i data-lucide="tag"></i> CATEGORY
                                </label>
                                <select class="ds-input ds-select" id="categoryFilter">
                                    <option value="">All categories</option>
                                    <option value="Safety">Safety</option>
                                    <option value="Quality">Quality</option>
                                    <option value="Cost">Cost</option>
                                    <option value="Productivity">Productivity</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button class="ds-btn ds-btn-primary w-100" onclick="repoUI.loadData()">
                                    <i data-lucide="refresh-cw"></i> Refresh Repository
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Projects Master Table -->
                <div class="ds-card fade-in">
                    <div class="ds-card-body p-0">
                        <div class="table-responsive">
                            <table class="ds-table ds-table-hover">
                                <thead>
                                    <tr>
                                        <th>Project Identity</th>
                                        <th>Leader / Team</th>
                                        <th>Current progress</th>
                                        <th>Efficiency</th>
                                        <th>Last Update</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="repoTableBody">
                                    <script>
                                        document.write(QCMS.tableSkeleton(8));
                                    </script>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
    const repoUI = {
        data: [],
        isAdmin: false,

        async init() {
            QCMS.init();

            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            this.isAdmin = (user.role || '').toLowerCase() === 'admin';
            
            await this.loadDepartments();
            await this.loadData();
            
            // Set up auto-refresh
            this.setupFilterListeners();
        },

        async loadDepartments() {
            try {
                const depts = await api.get('/admin/departments');
                const select = document.getElementById('deptFilter');
                depts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    select.appendChild(opt);
                });
            } catch (e) { console.error('Failed to load departments'); }
        },

        setupFilterListeners() {
            ['deptFilter', 'statusFilter', 'stageFilter', 'categoryFilter'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => this.loadData());
            });
        },

        async loadData() {
            try {
                const filters = {
                    department_id: document.getElementById('deptFilter').value,
                    status: document.getElementById('statusFilter').value,
                    stage: document.getElementById('stageFilter').value,
                    category: document.getElementById('categoryFilter').value
                };

                const res = await api.getRepositoryProjects(filters);
                this.data = res.projects;
                this.renderStats(res.stats);
                this.renderTable();
            } catch (e) {
                QCMS.toast('Failed to sync repository data', 'danger');
                document.getElementById('repoTableBody').innerHTML = 
                    `<tr><td colspan="6">${QCMS.emptyState('alert-circle', 'Sync Error', e.message)}</td></tr>`;
                if (window.lucide) lucide.createIcons();
            }
        },

        renderStats(stats) {
            const container = document.getElementById('repoStats');
            container.innerHTML = `
                <div class="col-md-3">
                    ${QCMS.kpiCard('Total Repository', stats.total, 'database', 'blue')}
                </div>
                <div class="col-md-3">
                    ${QCMS.kpiCard('Active Initiatives', stats.active, 'activity', 'green')}
                </div>
                <div class="col-md-3">
                    ${QCMS.kpiCard('Completed Projects', stats.completed, 'check-circle', 'cyan')}
                </div>
                <div class="col-md-3">
                    ${QCMS.kpiCard('Stalled (No Update)', stats.stalled, 'clock', 'red')}
                </div>
            `;
            if (window.lucide) lucide.createIcons();
        },

        renderTable() {
            const body = document.getElementById('repoTableBody');
            if (!this.data.length) {
                body.innerHTML = `<tr><td colspan="6">${QCMS.emptyState('search', 'No results Match', 'Try broadening your search criteria.')}</td></tr>`;
                if (window.lucide) lucide.createIcons();
                return;
            }

            body.innerHTML = this.data.map(p => `
                <tr class="${p.is_stalled ? 'stalled-row' : ''} fade-in">
                    <td>
                        <div class="d-flex align-items-center">
                            <div>
                                <div class="fw-bold text-dark d-flex align-items-center">
                                    ${p.title}
                                    ${p.is_stalled ? '<span class="stalled-badge">Stalled</span>' : ''}
                                </div>
                                <div class="text-xs text-muted d-flex align-items-center gap-1">
                                    <span class="fw-bold text-primary">${p.project_uid}</span> · 
                                    ${QCMS.categoryBadge(p.category)} · 
                                    ${p.department}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="text-sm fw-medium">${p.team_leader}</div>
                        <div class="text-xs text-muted">Facilitator / TL</div>
                    </td>
                    <td style="width:180px;">
                        ${QCMS.projectProgress(p.current_stage || 1, 8)}
                    </td>
                    <td>
                        <div class="text-sm fw-bold ${p.efficiency > 0 ? 'text-green' : 'text-muted'}">${p.efficiency}% Improvement</div>
                        <div class="efficiency-progress">
                            <div class="efficiency-fill" style="width: ${Math.min(p.efficiency, 100)}%"></div>
                        </div>
                    </td>
                    <td>
                        <div class="text-sm fw-medium">${QCMS.formatRelative(p.last_updated)}</div>
                        <div class="text-xs text-muted">Latest update</div>
                    </td>
                    <td class="text-end">
                        <div class="d-flex justify-content-end gap-1">
                            <a href="workspace.html?project=${p.id}" class="ds-btn ds-btn-xs ds-btn-ghost d-flex align-items-center gap-1" title="Continue Workflow">
                                <i data-lucide="play-circle" style="width:14px;"></i> Continue
                            </a>
                            <button class="ds-btn ds-btn-xs ds-btn-ghost d-flex align-items-center gap-1" onclick="window.location.href='analytics.html?project=${p.id}'" title="View Impact Report">
                                <i data-lucide="file-bar-chart" style="width:14px;"></i> Report
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }
    };

    document.addEventListener('DOMContentLoaded', () => repoUI.init());
    </script>
</body>
</html>
