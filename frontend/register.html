<!DOCTYPE html>
<html lang="en">

<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: var(--ds-bg-mesh);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-card {
            max-width: 580px; /* Widened from 480px */
            width: 100%;
            padding: var(--ds-space-12) !important;
        }

        .register-card h2 {
            font-size: 1.75rem;
            font-weight: 850;
            letter-spacing: -0.04em;
            margin-bottom: var(--ds-space-2);
            color: var(--ds-text-main);
        }

        .register-card .subtitle {
            color: var(--ds-text-secondary);
            font-size: 0.9375rem;
            margin-bottom: var(--ds-space-8);
            line-height: 1.5;
        }

        .register-footer {
            text-align: center;
            margin-top: var(--ds-space-8);
            font-size: 0.875rem;
            color: var(--ds-text-secondary);
            border-top: 1px solid var(--ds-border-color);
            padding-top: var(--ds-space-6);
        }

        .register-footer a {
            color: var(--ds-accent);
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.5rem;
        }

        .register-footer a:hover {
            text-decoration: underline;
        }

        .ds-field {
            margin-bottom: var(--ds-space-6);
        }

        .ds-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8125rem;
            font-weight: 650;
            margin-bottom: var(--ds-space-3);
            color: var(--ds-text-secondary);
        }

        .ds-label i {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="register-card glass-card fade-in-up">
        <div class="text-center mb-5">
            <div class="brand-icon mx-auto mb-3" style="width:56px; height:56px; border-radius:14px;">
                <i data-lucide="shield-check" style="width:28px; height:28px;"></i>
            </div>
            <div class="brand-text">
                QCMS <small>Enterprise Quality Management</small>
            </div>
        </div>

        <div class="text-center">
            <h2>Create your account</h2>
            <p class="subtitle">Join your organization's quality management platform and start managing standards.</p>
        </div>

        <div id="errorMsg" class="ds-toast error mb-4" style="display:none; width: 100%; min-width: auto; animation: none;">
            <i data-lucide="alert-circle"></i>
            <span></span>
        </div>
        <div id="successMsg" class="ds-toast success mb-4" style="display:none; width: 100%; min-width: auto; animation: none;">
            <i data-lucide="check-circle"></i>
            <span></span>
        </div>

        <form id="registerForm">
            <div class="ds-field">
                <label class="ds-label"><i data-lucide="user"></i> Username *</label>
                <input type="text" class="ds-input" id="username" placeholder="Choose a username" required>
            </div>
            <div class="ds-field">
                <label class="ds-label"><i data-lucide="mail"></i> Email Address *</label>
                <input type="email" class="ds-input" id="email" placeholder="your@email.com" required>
            </div>
            <div class="ds-field">
                <label class="ds-label"><i data-lucide="lock"></i> Password *</label>
                <div class="position-relative">
                    <input type="password" class="ds-input pe-5" id="password" placeholder="Create a strong password" required>
                    <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent pe-3 text-white-50" onclick="togglePassword('password', this)">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="ds-field">
                <label class="ds-label"><i data-lucide="shield-check"></i> Confirm Password *</label>
                <div class="position-relative">
                    <input type="password" class="ds-input pe-5" id="confirm_password" placeholder="Confirm your password" required>
                    <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent pe-3 text-white-50" onclick="togglePassword('confirm_password', this)">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="ds-btn ds-btn-primary w-100 mt-4 ds-btn-lg">
                Create Account
            </button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Sign in now</a>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            if (window.lucide) lucide.createIcons();
        }
    </script>
</body>

</html>
