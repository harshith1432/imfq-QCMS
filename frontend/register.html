<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card {
            max-width: 480px; width: 100%; background: var(--bg-surface);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
            padding: var(--space-8); margin: var(--space-4);
        }
        .register-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: var(--space-1); }
        .register-card .subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: var(--space-6); }
        .register-footer { text-align: center; margin-top: var(--space-5); font-size: 0.8125rem; color: var(--text-secondary); }
        .register-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:var(--space-5);">
            <div style="width:36px;height:36px;border-radius:8px;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="shield-check" style="width:18px;height:18px;"></i>
            </div>
            <span style="font-weight:800;font-size:1.1rem;color:var(--text-primary);">QCMS</span>
        </div>
        <h2>Create your account</h2>
        <p class="subtitle">Join your organization's quality management platform</p>

        <div id="errorMsg" style="display:none;padding:10px 14px;background:var(--error-50);border:1px solid var(--error-200);border-radius:var(--radius-md);color:var(--error);font-size:0.8125rem;margin-bottom:var(--space-4);"></div>
        <div id="successMsg" style="display:none;padding:10px 14px;background:var(--success-50);border:1px solid var(--success-200);border-radius:var(--radius-md);color:var(--success);font-size:0.8125rem;margin-bottom:var(--space-4);"></div>

        <form id="registerForm">
            <div class="ds-field">
                <label class="ds-label">Username *</label>
                <input type="text" class="ds-input" id="username" placeholder="Choose a username" required>
            </div>
            <div class="ds-field">
                <label class="ds-label">Email *</label>
                <input type="email" class="ds-input" id="email" placeholder="your@email.com" required>
            </div>
            <div class="ds-field">
                <label class="ds-label">Password *</label>
                <input type="password" class="ds-input" id="password" placeholder="Create a strong password" required>
            </div>
            <div class="ds-field">
                <label class="ds-label">Confirm Password *</label>
                <input type="password" class="ds-input" id="confirm_password" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="ds-btn ds-btn-primary" style="width:100%;padding:12px;font-size:0.9375rem;">
                Create Account
            </button>
        </form>

        <div class="register-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
