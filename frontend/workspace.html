<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content">
                <!-- Project Progress Header -->
                <div class="ds-card fade-in mb-4">
                    <div class="ds-card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <div>
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <h1 class="page-heading mb-0" id="projectTitle">Loading...</h1>
                                <span id="projectStatusBadge"></span>
                            </div>
                            <p class="mb-0 text-sm text-muted" id="projectMeta">Project ID and Department will appear
                                here.</p>
                        </div>
                        <div id="projectActions" class="d-flex gap-2"></div>
                    </div>
                </div>

                <!-- Methodology Stepper -->
                <div id="stepperContainer" class="fade-in mb-4">
                    <!-- QCMS.stageStepper will be injected here -->
                </div>

                <!-- 3-Panel Workspace -->
                <div class="workspace-layout fade-in">
                    <!-- Left: Stage Selector -->
                    <div class="workspace-sidebar">
                        <div class="ds-card h-100">
                            <div class="ds-card-header p-30 px-3">
                                <span class="text-xs fw-bold text-muted text-uppercase tracking-wider">Methodology
                                    Stages</span>
                            </div>
                            <div class="ds-card-body p-0" id="stageList">
                                <!-- Stage nav buttons injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Center: Stage Content & Execution -->
                    <div class="workspace-main">
                        <div class="ds-card h-100 d-flex flex-column">
                            <div class="ds-card-header d-flex justify-content-between align-items-center">
                                <h5 class="card-title" id="stageTitle">Stage Content</h5>
                                <div id="stageStatusBadge"></div>
                            </div>
                            <div class="ds-card-body overflow-auto flex-grow-1" id="stageBody">
                                <div class="p-4 text-center">
                                    <div class="spinner-border text-primary" role="status"></div>
                                    <p class="mt-2 text-muted">Loading stage data...</p>
                                </div>
                            </div>
                            <div class="ds-card-footer bg-light border-top p-3" id="stageActions" style="display:none;">
                                <!-- Role-based actions injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Right: Activity & Metadata -->
                    <div class="workspace-details">
                        <div class="ds-card h-100">
                            <div class="ds-card-header p-30 px-3">
                                <span class="text-xs fw-bold text-muted text-uppercase tracking-wider">Project
                                    Lifecycle</span>
                            </div>
                            <div class="ds-card-body p-0" id="activityPanel">
                                <div id="activityLog" class="activity-feed">
                                    <p class="text-center text-muted text-xs p-4">Initializing timeline...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Data Submission Modal -->
    <div class="modal fade" id="stageModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Submit Stage Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-4" id="modalBody">
                    <!-- Dynamic form based on stage -->
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="ds-btn ds-btn-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="ds-btn ds-btn-primary" id="saveStageBtn">Save Stage Data</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const STAGE_NAMES = [
            '', 'Problem Identification', 'Data Collection', 'Root Cause Analysis',
            'Solution Proposal', 'Approval Workflow', 'Implementation',
            'Impact Measurement', 'Closure & Standardization'
        ];

        const workspace = {
            projectId: null,
            project: null,
            currentStage: 1,
            viewingStage: 1,
            userRole: null,
            modal: null,

            async init() {
                QCMS.init();
                this.modal = new bootstrap.Modal(document.getElementById('stageModal'));

                const params = new URLSearchParams(window.location.search);
                this.projectId = params.get('project');
                this.userRole = QCMS.user?.role || localStorage.getItem('role') || 'Team Member';

                if (!this.projectId) {
                    window.location.href = 'dashboard-' + QCMS.roleToSlug(this.userRole) + '.html';
                    return;
                }

                await this.loadProject();
                this.loadActivity();

                document.getElementById('saveStageBtn').onclick = () => this.submitData();
            },

            async loadProject() {
                try {
                    this.project = await api.get(`/projects/${this.projectId}`);
                    this.currentStage = this.project.current_stage || 1;
                    this.viewingStage = this.currentStage;

                    // Update Header
                    document.getElementById('projectTitle').textContent = this.project.title;
                    document.getElementById('projectStatusBadge').innerHTML = QCMS.statusBadge(this.project.status);
                    document.getElementById('projectMeta').innerHTML = `
                    <span class="fw-medium">${this.project.project_uid || 'P-NEW'}</span> · 
                    <span>${this.project.department || 'N/A'}</span> · 
                    ${QCMS.categoryBadge(this.project.category)}
                `;

                    // Render Progress Components
                    document.getElementById('stepperContainer').innerHTML = QCMS.stageStepper(this.currentStage);
                    this.renderStageNav();
                    this.viewStage(this.currentStage);

                    if (window.lucide) lucide.createIcons();
                } catch (e) {
                    console.error(e);
                    QCMS.toast('Failed to load project details', 'danger');
                }
            },

            renderStageNav() {
                const list = document.getElementById('stageList');
                list.innerHTML = STAGE_NAMES.slice(1).map((name, i) => {
                    const num = i + 1;
                    let state = 'locked';
                    if (num < this.currentStage) state = 'completed';
                    else if (num === this.currentStage) state = 'active';

                    const isSelected = num === this.viewingStage;
                    const isDisabled = num > this.currentStage;

                    return `
                    <button class="stage-nav-btn ${state} ${isSelected ? 'selected' : ''}" 
                            onclick="workspace.viewStage(${num})" ${isDisabled ? 'disabled' : ''}>
                        <div class="stage-nav-num">${num < this.currentStage ? '✓' : num}</div>
                        <div class="stage-nav-label">${name}</div>
                    </button>
                `;
                }).join('');
            },

            async viewStage(num) {
                this.viewingStage = num;
                this.renderStageNav();

                const title = document.getElementById('stageTitle');
                const state = document.getElementById('stageStatusBadge');
                const body = document.getElementById('stageBody');
                const actions = document.getElementById('stageActions');

                title.textContent = `Stage ${num}: ${STAGE_NAMES[num]}`;

                    // Determine display state
                    let displayStatus = 'Not Started';
                    if (Number(num) < Number(this.currentStage)) displayStatus = 'Completed';
                    else if (Number(num) == Number(this.currentStage)) displayStatus = 'In Progress';
                    state.innerHTML = QCMS.statusBadge(displayStatus);

                    try {
                        // Fetch stage-specific data
                        const resp = await api.get(`/workflow/${this.projectId}/stage/${num}`);
                        const data = resp.data;

                        if (data && Object.keys(data).length > 2) { // 2 assuming id and project_id are always there
                            body.innerHTML = this.renderDataView(data, num);
                        } else {
                            body.innerHTML = `
                            <div class="p-5 text-center fade-in">
                                <div class="mb-3 text-muted">
                                    <i data-lucide="${Number(num) == Number(this.currentStage) ? 'edit-3' : 'lock'}" style="width:48px;height:48px;"></i>
                                </div>
                                <h6 class="fw-bold">${Number(num) == Number(this.currentStage) ? 'Ready for Input' : 'No Data Available'}</h6>
                                <p class="text-sm text-muted">Detailed documentation for this stage will appear here after submission.</p>
                            </div>
                        `;
                        }

                        // Inject actions if viewing current stage or a completed past stage
                        if (Number(num) <= Number(this.currentStage) && this.canExecute()) {
                            actions.style.display = 'flex';
                            let actionHtml = '';

                            if (Number(num) == 4) {
                                actionHtml = `
                                <div class="d-flex w-100 justify-content-between align-items-center">
                                    <div class="text-xs text-muted">Finalize the solution and submit for Reviewer Approval.</div>
                                    <div class="d-flex gap-2">
                                        <button class="ds-btn ds-btn-sm ds-btn-ghost" onclick="workspace.openStageModal(${num})">Update Solution</button>
                                        <button class="ds-btn ds-btn-sm ds-btn-primary" onclick="workspace.advance()">Submit for Review</button>
                                    </div>
                                </div>
                            `;
                            } else if (Number(num) == 5) {
                                actionHtml = `
                                <div class="d-flex w-100 justify-content-center align-items-center p-3">
                                    <div class="text-center">
                                        <div class="ds-icon-circle bg-warning-soft text-warning mx-auto mb-2" style="width:48px;height:48px;">
                                            <i data-lucide="clock" style="width:24px;height:24px;"></i>
                                        </div>
                                        <h6 class="fw-bold">Awaiting Reviewer Approval</h6>
                                        <p class="text-xs text-muted">The project is currently in the verification queue. Stage 6 will unlock upon approval.</p>
                                    </div>
                                </div>
                            `;
                            } else {
                                actionHtml = `
                                <div class="d-flex w-100 justify-content-between align-items-center">
                                    <div class="text-xs text-muted">Current phase requires your input to proceed.</div>
                                    <div class="d-flex gap-2">
                                        <button class="ds-btn ds-btn-sm ds-btn-ghost" onclick="workspace.openStageModal(${num})">Update Data</button>
                                        ${Number(num) <= 3 ? `
                                            <button class="ds-btn ds-btn-sm ds-btn-primary" onclick="workspace.openStageModal(${num}, true)">
                                                <i data-lucide="check-circle-2" class="w-3 h-3 mr-1"></i> Save & Advance
                                            </button>
                                        ` : (Number(num) < 8) ? `
                                            <button class="ds-btn ds-btn-sm ds-btn-primary" onclick="workspace.advance()">Advance to Stage ${num + 1}</button>
                                        ` : `
                                            <button class="ds-btn ds-btn-sm ds-btn-primary" disabled title="Finalize closure from facilitator dashboard">
                                                <i data-lucide="lock" class="w-3 h-3 mr-1"></i> Awaiting Facilitator Sign-off
                                            </button>
                                        `}
                                    </div>
                                </div>
                            `;
                            }
                            actions.innerHTML = actionHtml;
                        } else {
                            actions.style.display = 'none';
                        }

                        if (window.lucide) lucide.createIcons();
                    } catch (e) {
                        console.error(e);
                        body.innerHTML = `<div class="p-4">${QCMS.emptyState('alert-circle', 'Load Error', 'Could not retrieve stage data.')}</div>`;
                    }
                },

                canExecute() {
                    const roleStr = String(this.userRole || QCMS.user?.role || localStorage.getItem('role') || '').toLowerCase().trim();
                    // Explicitly restrict Reviewer from executing these stages but default allow others
                    // to prevent string mismatch issues like 'team leader' vs 'teamleader' or trailing spaces
                    return !roleStr.includes('reviewer');
                },

            renderDataView(data, stage) {
                const skip = ['id', 'project_id', 'created_at', 'updated_at'];
                return `
                <div class="p-4 fade-in">
                    <table class="ds-table table-bordered">
                        ${Object.entries(data)
                        .filter(([k]) => !skip.includes(k))
                        .map(([k, v]) => `
                                <tr>
                                    <th class="bg-light text-xs text-uppercase text-muted" style="width:30%">${k.replace(/_/g, ' ')}</th>
                                    <td class="text-sm">${v || '—'}</td>
                                </tr>
                            `).join('')}
                    </table>
                </div>
            `;
            },

            async loadActivity() {
                const log = document.getElementById('activityLog');
                try {
                    const events = await api.get(`/projects/${this.projectId}/activity`);
                    if (!events.length) {
                        log.innerHTML = `<p class="p-4 text-center text-xs text-muted">Timeline started</p>`;
                        return;
                    }
                    log.innerHTML = events.map(e => `
                    <div class="activity-item">
                        <div class="activity-dot"></div>
                        <div class="activity-content">
                            <div class="text-xs fw-semibold">${e.action || 'Stage Updated'}</div>
                            <div class="text-xs text-muted">${QCMS.formatRelative(e.timestamp || e.created_at)}</div>
                        </div>
                    </div>
                `).join('');
                } catch (e) { console.error(e); }
            },

            openStageModal(num, autoAdvance = false) {
                this._autoAdvance = autoAdvance;
                const body = document.getElementById('modalBody');
                document.getElementById('modalTitle').textContent = `Update Stage ${num}`;
                const saveBtn = document.getElementById('saveStageBtn');
                
                if (autoAdvance) {
                    saveBtn.innerHTML = '<i data-lucide="check-circle-2" class="w-3 h-3 mr-1"></i> Save & Advance';
                    saveBtn.className = 'ds-btn ds-btn-primary';
                } else {
                    saveBtn.innerHTML = 'Save Stage Data';
                    saveBtn.className = 'ds-btn ds-btn-primary';
                }

                // This is where we define the forms for each stage
                body.innerHTML = this.getStageForm(num);
                this.modal.show();
                if (window.lucide) lucide.createIcons();
            },

            getStageForm(num) {
                const configs = {
                    1: [
                        { key: 'problem_statement', label: 'Problem Statement', type: 'textarea', icon: 'file-text', placeholder: 'Clearly define the problem...' },
                        { key: 'description', label: 'Detailed Description', type: 'textarea', icon: 'align-left', placeholder: 'Provide any additional context...' },
                        { key: 'location', label: 'Physical Location', type: 'text', icon: 'map-pin', placeholder: 'Where does it occur?' },
                        { key: 'frequency_of_occurrence', label: 'Frequency of Occurrence', type: 'text', icon: 'clock', placeholder: 'Daily, weekly, etc.' },
                        { key: 'evidence', label: 'Evidence (Link/Observation)', type: 'text', icon: 'link' },
                        { key: 'initial_impact', label: 'Initial Impact', type: 'textarea', icon: 'alert-triangle' }
                    ],
                    2: [
                        { key: 'collection_methods', label: 'Data Collection Methods', type: 'textarea', icon: 'clipboard-list', placeholder: 'Describe how data was collected...' },
                        { key: 'sample_size', label: 'Sample Size', type: 'text', icon: 'hash', placeholder: 'e.g. 100 units / 5 days' },
                        { key: 'data_source', label: 'Data Source', type: 'text', icon: 'database', placeholder: 'e.g. Production Logs' },
                        { key: 'initial_findings', label: 'Initial Findings', type: 'textarea', icon: 'bar-chart-2' }
                    ],
                    3: [
                        { key: 'analysis_method', label: 'Analysis Method', type: 'select', icon: 'search', options: ['Fishbone', '5 Why', 'Pareto', 'Brainstorming'] },
                        { key: 'root_cause', label: 'Final Root Cause', type: 'textarea', icon: 'target', placeholder: 'Identify the primary cause...' }
                    ],
                    4: [
                        { key: 'budget_required', label: 'Budget Required (USD)', type: 'number', icon: 'dollar-sign' },
                        { key: 'estimated_roi', label: 'Estimated ROI (%)', type: 'number', icon: 'trending-up' },
                        { key: 'resource_plan', label: 'Resource Plan', type: 'textarea', icon: 'users', placeholder: 'Manpower and tools needed...' },
                        { key: 'kpi_targets', label: 'KPI Targets (JSON)', type: 'textarea', icon: 'bar-chart', placeholder: '{"quality": 95, "savings": 1000}' },
                        { key: 'implementation_plan', label: 'Detailed Implementation Plan', type: 'textarea', icon: 'calendar' }
                    ]
                };

                const fields = configs[num] || [{ key: 'notes', label: 'Stage Details', type: 'textarea', icon: 'info', placeholder: 'Additional comments...' }];

                return fields.map(f => `
                <div class="ds-field mb-4">
                    <label class="ds-label">
                        <i data-lucide="${f.icon || 'circle'}" style="width: 16px; height: 16px;"></i>
                        ${f.label}
                    </label>
                    <div class="ds-field-content">
                        ${f.type === 'textarea'
                        ? `<textarea class="ds-textarea w-100" id="form_${f.key}" rows="4" placeholder="${f.placeholder || ''}"></textarea>`
                        : f.type === 'select'
                            ? `<select class="ds-select w-100" id="form_${f.key}">${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`
                            : `<input type="${f.type || 'text'}" class="ds-input w-100" id="form_${f.key}" placeholder="${f.placeholder || ''}">`
                    }
                    </div>
                </div>
            `).join('');
            },

            async submitData() {
                const payload = {};
                // Gather from current form
                const inputs = document.querySelectorAll('[id^="form_"]');
                inputs.forEach(i => payload[i.id.replace('form_', '')] = i.value);

                try {
                    // Submit to workflow engine
                    await api.post(`/workflow/${this.projectId}/stage/${this.viewingStage}`, payload);
                    QCMS.toast('Data saved successfully', 'success');
                    this.modal.hide();
                    
                    if (this._autoAdvance) {
                        this._autoAdvance = false;
                        if (Number(this.viewingStage) === Number(this.currentStage)) {
                            await this.advance(true); // pass true to skip confirmation if already clicked
                        } else {
                            QCMS.toast('Past data saved. Project stage remains unchanged.', 'info');
                            setTimeout(() => window.location.reload(), 1500);
                        }
                    } else {
                        this.viewStage(this.viewingStage);
                        this.loadActivity();
                    }
                } catch (e) { QCMS.toast(e?.message || 'Submission failed', 'danger'); }
            },

            async advance(skipConfirm = false) {
                if (this.currentStage >= 8) {
                    QCMS.toast('Project is in the final stage (8). Awaiting Facilitator closure.', 'info');
                    return;
                }
                if (!skipConfirm && !confirm(`Are you sure you want to advance to Stage ${this.currentStage + 1}?`)) return;
                try {
                    if (this.currentStage === 4) {
                        await api.post(`/workflow/${this.projectId}/submit`);
                    } else {
                        await api.post(`/workflow/projects/${this.projectId}/transitions`, { stage: this.currentStage + 1 });
                    }
                    QCMS.toast('Project advanced!', 'success');
                    this.loadProject();
                    this.loadActivity();
                } catch (e) { QCMS.toast('Transition failed: ' + e.message, 'danger'); }
            }
        };

        document.addEventListener('DOMContentLoaded', () => workspace.init());
    </script>
</body>

</html>
