<!DOCTYPE html>
<html lang="en">

<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Repository | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="assets/js/ux/breadcrumbs.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Styles moved to design-system.css and global components */
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>
        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content-inner">
                <!-- Standardized Header -->
                <header class="ds-header-layout section-spacing px-0">
                    <div class="h-stack justify-content-between w-100">
                        <div class="v-stack">
                            <h1 class="ds-title mb-0">Knowledge Repository</h1>
                            <p class="ds-text-secondary mb-0">Centralized archive of all completed quality projects. Learn from past solutions and promote best practices.</p>
                        </div>
                    </div>
                </header>

                <!-- Standardized Search Area -->
                <div class="glass-card ds-card mb-4">
                    <div class="ds-card-body p-4">
                        <div class="h-stack justify-content-between flex-wrap gap-3">
                            <div class="h-stack gap-3">
                                <div class="v-stack">
                                    <label class="ds-label mb-2">DEPARTMENT</label>
                                    <select class="ds-input ds-select" id="filterDept" style="width: 200px;">
                                        <option value="">All Departments</option>
                                    </select>
                                </div>
                                <div class="v-stack">
                                    <label class="ds-label mb-2">CATEGORY</label>
                                    <select class="ds-input ds-select" id="filterCategory" style="width: 180px;">
                                        <option value="">All Categories</option>
                                        <option value="Safety">Safety</option>
                                        <option value="Quality">Quality</option>
                                        <option value="Productivity">Productivity</option>
                                        <option value="Cost">Cost Reduction</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="ds-tab-group mb-4">
                    <button class="ds-btn-tab active" data-tab="browse" onclick="repoApp.showTab('browse', this)">
                        <i data-lucide="grid" style="width:16px;height:16px; stroke-width: 2.2;"></i>
                        <span>Browse Projects</span>
                    </button>
                    <button class="ds-btn-tab" data-tab="sop" onclick="repoApp.showTab('sop', this)">
                        <i data-lucide="file-text" style="width:16px;height:16px; stroke-width: 2.2;"></i>
                        <span>SOP Library</span>
                    </button>
                </div>

                <div id="browseSection">
                    <div class="corporate-grid" id="projectGrid"></div>
                    <nav class="mt-5 d-flex justify-content-center">
                        <div id="pagination" class="d-flex gap-2"></div>
                    </nav>
                </div>

                <div id="sopSection" style="display:none;">
                    <div class="corporate-grid" id="sopGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content glass-card">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title fw-bold" id="detailTitle">Project Title</h5>
                        <p class="text-xs text-muted mb-0" id="detailMeta">Category • Archived on</p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailBody">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const repoApp = {
            currentPage: 1,
            perPage: 12,

            async init() {
                QCMS.init();
                const searchInput = document.getElementById('globalSearchInput');
                if (searchInput) {
                    searchInput.placeholder = "Search repository...";
                    searchInput.oninput = () => this.onSearchInput();
                }
                this.loadDepartments();
                this.search();
                if (window.lucide) lucide.createIcons();
            },

            searchTimeout: null,
            onSearchInput() {
                clearTimeout(this.searchTimeout);
                this.searchTimeout = setTimeout(() => this.search(1), 300);
            },

            async loadDepartments() {
                try {
                    const depts = await api.get('/admin/departments');
                    const select = document.getElementById('filterDept');
                    depts.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        opt.textContent = d.name;
                        select.appendChild(opt);
                    });
                } catch (e) { }
            },

            async search(page = 1) {
                this.currentPage = page;
                const keyword = document.getElementById('globalSearchInput')?.value || '';
                const dept = document.getElementById('filterDept').value;
                const category = document.getElementById('filterCategory').value;

                let params = `page=${page}&per_page=${this.perPage}`;
                if (keyword) params += `&q=${encodeURIComponent(keyword)}`;
                if (dept) params += `&department_id=${dept}`;
                if (category) params += `&category=${category}`;

                const grid = document.getElementById('projectGrid');
                grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';

                try {
                    const result = await api.get(`/repository/search?${params}`);
                    this.renderGrid(result.results, result.total, result.pages);
                } catch (err) {
                    grid.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">No archived projects found.</p></div>';
                }
            },
            renderGrid(projects, total, pages) {
                const grid = document.getElementById('projectGrid');
                const query = document.getElementById('globalSearchInput')?.value || '';

                if (!projects || projects.length === 0) {
                    if (query) {
                        grid.innerHTML = `<div class="col-12 py-5 px-3">
                            ${QCMS.emptyState('No Projects Found', `We couldn't find any projects matching "${query}".`, 'search-x')}
                        </div>`;
                    } else {
                        grid.innerHTML = `<div class="col-12 py-5 px-3">
                            ${QCMS.emptyState('Archive Empty', 'No archived projects are currently available for the selected filters.', 'folder-search')}
                        </div>`;
                    }
                    if (window.lucide) lucide.createIcons();
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                grid.innerHTML = projects.map(p => `
                <div class="glass-card ds-card fade-in h-100">
                    <div class="ds-card-header h-stack justify-content-between">
                        ${QCMS.categoryBadge(p.category || 'General')}
                        <small class="text-xs text-secondary fw-bold uppercase opacity-60">${p.department_name}</small>
                    </div>
                    <div class="ds-card-body p-4">
                        <h5 class="fw-bold mb-3" style="font-size: 1.1rem; color: var(--ds-text-main);">${p.title}</h5>
                        <p class="text-sm ds-text-secondary mb-4 line-clamp-2">${p.problem_summary || 'No summary available.'}</p>
                        
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <div class="glass-panel p-2 text-center" style="background: rgba(var(--ds-primary-rgb), 0.03); border-radius: 10px; border: 1px solid var(--ds-border-color);">
                                    <small class="text-muted d-block text-xxs uppercase mb-1">KPI Improvement</small>
                                    <span class="fw-bold text-accent" style="font-size: 1rem;">${p.kpi_improvement_pct || 0}%</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="glass-panel p-2 text-center" style="background: rgba(var(--ds-green-rgb), 0.03); border-radius: 10px; border: 1px solid var(--ds-border-color);">
                                    <small class="text-muted d-block text-xxs uppercase mb-1">Cost Savings</small>
                                    <span class="fw-bold text-green" style="font-size: 1rem;">₹${(p.cost_savings || 0).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                        
                        <button class="ds-btn ds-btn-secondary w-100" onclick="repoApp.viewDetail(${p.id})">
                            <i data-lucide="external-link" style="width:14px;height:14px;"></i> View Solution
                        </button>
                    </div>
                </div>
            `).join('');

                let pagHtml = '';
                for (let i = 1; i <= pages; i++) {
                    pagHtml += `<button class="ds-btn ${i === this.currentPage ? 'ds-btn-primary' : 'ds-btn-secondary'} ds-btn-sm" 
                            style="min-width:40px;" onclick="repoApp.search(${i})">${i}</button>`;
                }
                document.getElementById('pagination').innerHTML = pagHtml;
                if (window.lucide) lucide.createIcons();
            },

            async viewDetail(entryId) {
                try {
                    const detail = await api.get(`/repository/${entryId}`);
                    document.getElementById('detailTitle').textContent = detail.title;
                    document.getElementById('detailMeta').textContent = `${detail.category || 'General'} • Archived ${new Date(detail.archived_at).toLocaleDateString()}`;

                    const stages = ['Identification', 'Selection', 'Analysis', 'Causes', 'Root Cause', 'Data Analysis', 'Development', 'Implementation'];
                    const timeline = stages.map((s, i) => `
                    <div class="stage-step completed">
                        <div class="stage-dot">${i + 1}</div>
                        <small class="text-xxs d-block mt-1">${s}</small>
                    </div>
                `).join('');

                    document.getElementById('detailBody').innerHTML = `
                    <div class="glass-panel p-4 mb-4">
                        <h6 class="text-xxs fw-bold uppercase text-muted mb-3">Project Lifecycle</h6>
                        <div class="stage-timeline">${timeline}</div>
                    </div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="glass-panel p-4 h-100">
                                <h6 class="text-xxs fw-bold uppercase text-muted">Problem Statement</h6>
                                <p class="mb-0 text-sm">${detail.problem_summary || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="glass-panel p-4 h-100">
                                <h6 class="text-xxs fw-bold uppercase text-muted">Root Cause</h6>
                                <p class="mb-0 text-sm">${detail.root_cause || 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                `;
                    new bootstrap.Modal(document.getElementById('detailModal')).show();
                    if (window.lucide) lucide.createIcons();
                } catch (e) { QCMS.toast('Failed to load details', 'error'); }
            },

            showTab(tab, btn) {
                document.querySelectorAll('.ds-btn-tab').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');

                document.getElementById('browseSection').style.display = tab === 'browse' ? '' : 'none';
                document.getElementById('sopSection').style.display = tab === 'sop' ? '' : 'none';
                if (tab === 'sop') this.loadSOPs();
            },

            async loadSOPs() {
                try {
                    const sops = await api.get('/repository/sop-library');
                    const grid = document.getElementById('sopGrid');
                    if (!sops.length) { grid.innerHTML = '<div class="col-12 text-center p-5 text-muted">No SOPs found</div>'; return; }

                    grid.innerHTML = sops.map(s => `
                    <div class="glass-card p-3 fade-in">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center gap-3">
                                <div class="glass-icon-container" style="background: rgba(var(--ds-accent-rgb), 0.1); width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                                    <i data-lucide="file-text" class="text-accent" style="width:20px; height:20px;"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold text-sm">${s.title}</h6>
                                    <small class="text-xxs text-secondary uppercase opacity-60 font-inter">${s.category || 'Standard'}</small>
                                </div>
                            </div>
                            <a href="${s.sop_path}" class="ds-btn ds-btn-ghost ds-btn-icon ds-btn-sm" target="_blank" title="Download">
                                <i data-lucide="download"></i>
                            </a>
                        </div>
                    </div>
                `).join('');
                    if (window.lucide) lucide.createIcons();
                } catch (e) { }
            }
        };
        document.addEventListener('DOMContentLoaded', () => repoApp.init());
    </script>
</body>

</html>
