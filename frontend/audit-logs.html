<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content">
                <div class="content-header fade-in">
                    <h1 class="page-heading">System Audit Registry</h1>
                    <p class="page-description">Security events, project transitions, and administrative actions history.</p>
                </div>

                <div class="ds-card mt-4 fade-in">
                    <div class="ds-card-header bg-white border-light">
                        <div class="header-actions w-100 justify-content-between">
                            <div class="d-flex gap-2">
                                <select class="ds-input ds-select" style="width:auto; height:40px;">
                                    <option>All Systems</option>
                                    <option>Auth Events</option>
                                    <option>Workflow Edits</option>
                                    <option>Project Deletion</option>
                                </select>
                            </div>
                            <button class="ds-btn ds-btn-outline">
                                <i data-lucide="filter" class="me-2"></i> Advanced Filters
                            </button>
                        </div>
                    </div>
                    <div class="ds-card-body p-0">
                        <table class="ds-table">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Operator</th>
                                    <th>Event Category</th>
                                    <th>Object Affected</th>
                                    <th>Integrity Hash</th>
                                    <th class="text-end">Trace</th>
                                </tr>
                            </thead>
                            <tbody id="auditBody">
                                <!-- Loaded via script -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const Audit = {
            async init() {
                QCMS.init();
                this.loadLogs();
            },

            async loadLogs() {
                try {
                    const logs = await api.get('/admin/audit-logs');
                    const body = document.getElementById('auditBody');
                    
                    if (!logs.length) {
                        body.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-muted">No audit events recorded yet.</td></tr>`;
                        return;
                    }

                    body.innerHTML = logs.map(l => `
                        <tr class="fade-in">
                            <td class="text-xs text-muted font-mono">${QCMS.formatRelative(l.timestamp)}</td>
                            <td><span class="fw-bold text-slate-900">${l.user}</span></td>
                            <td><span class="ds-badge blue">${l.action}</span></td>
                            <td><span class="text-sm fw-medium">${l.target}</span></td>
                            <td class="text-xs font-mono opacity-50">${l.id.toString(16).padStart(8, '0')}</td>
                            <td class="text-end">
                                <button class="nav-icon-btn d-inline-flex" style="width:28px; height:28px;" onclick="console.log('${l.details}')">
                                    <i data-lucide="eye" style="width:14px;"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                    if (window.lucide) lucide.createIcons();
                } catch (e) {
                    QCMS.toast('Failed to load audit logs', 'error');
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => Audit.init());
    </script>
</body>
</html>
