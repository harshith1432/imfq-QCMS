<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="assets/js/ux/breadcrumbs.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content-inner fade-in-up">
                <header class="ds-header-layout section-spacing">
                    <div class="h-stack justify-content-between w-100">
                        <div class="v-stack">
                            <h1 class="ds-title mb-0">System Audit Registry</h1>
                            <p class="ds-text-secondary mb-0">Security events, project transitions, and administrative actions history.</p>
                        </div>
                    </div>
                </header>

                <div class="glass-card ds-card section-spacing">
                    <div class="ds-card-header h-stack justify-content-between px-4 py-3">
                        <div class="v-stack">
                            <h5 class="mb-0 fw-bold">Audit Stream</h5>
                            <p class="text-xs text-secondary mb-0">Real-time monitoring of system integrity</p>
                        </div>
                        <div class="h-stack gap-2">
                            <select class="ds-input" style="width:180px;">
                                <option>All Systems</option>
                                <option>Auth Events</option>
                                <option>Workflow Edits</option>
                                <option>Project Deletion</option>
                            </select>

                        </div>
                    </div>
                    <div class="ds-card-body p-0">
                        <div class="table-responsive">
                            <table class="ds-table">
                                <thead>
                                    <tr>
                                        <th>Timestamp</th>
                                        <th>Operator</th>
                                        <th>Event Category</th>
                                        <th>Object Affected</th>
                                        <th>Integrity Hash</th>
                                        <th class="text-end">Trace</th>
                                    </tr>
                                </thead>
                                <tbody id="auditBody">
                                    <tr>
                                        <td colspan="6" class="p-5 text-center">
                                            <div class="spinner-border spinner-border-sm text-primary opacity-50" role="status"></div>
                                            <span class="ms-2 text-secondary">Loading audit secure stream...</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const Audit = {
            logs: [],
            async init() {
                QCMS.init();
                await this.loadLogs();
                const searchInput = document.getElementById('globalSearchInput');
                if (searchInput) {
                    searchInput.placeholder = "Search audit logs...";
                    searchInput.addEventListener('input', () => this.renderLogs());
                }
            },

            async loadLogs() {
                try {
                    this.logs = await api.get('/admin/audit-logs');
                    this.renderLogs();
                } catch (e) {
                    QCMS.toast('Failed to load audit logs', 'error');
                }
            },

            renderLogs() {
                const body = document.getElementById('auditBody');
                const query = document.getElementById('globalSearchInput')?.value.toLowerCase() || '';
                
                let filtered = this.logs;
                if (query) {
                    filtered = this.logs.filter(l => {
                        const searchStr = `${l.user} ${l.action} ${l.target} ${l.details || ''}`.toLowerCase();
                        return searchStr.includes(query);
                    });
                }

                if (!filtered.length) {
                    if (query) {
                        body.innerHTML = `<tr><td colspan="6" class="text-center py-5">
                            <div class="empty-state fade-in">
                                <i data-lucide="search-x" class="text-muted mb-3" style="width: 48px; height: 48px; opacity: 0.5;"></i>
                                <h5 class="fw-semibold text-dark mb-1">No results found</h5>
                                <p class="text-muted text-sm">No logs match "${query}". Try adjusting your search term.</p>
                            </div>
                        </td></tr>`;
                    } else {
                        body.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-muted">No audit events recorded yet.</td></tr>`;
                    }
                    if (window.lucide) lucide.createIcons();
                    return;
                }

                body.innerHTML = filtered.map(l => `
                    <tr class="fade-in">
                        <td class="text-xs text-secondary font-mono">${QCMS.formatRelative(l.timestamp)}</td>
                        <td><span class="fw-bold text-main">${l.user}</span></td>
                        <td><span class="ds-badge blue">${l.action}</span></td>
                        <td><span class="text-sm fw-medium">${l.target}</span></td>
                        <td class="text-xs font-mono opacity-50">${l.id.toString(16).padStart(8, '0')}</td>
                        <td class="text-end">
                            <button class="ds-btn ds-btn-ghost ds-btn-icon ds-btn-sm" onclick="console.log('${l.details || ''}')">
                                <i data-lucide="eye" style="width:14px;"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
                if (window.lucide) lucide.createIcons();
            }
        };

        document.addEventListener('DOMContentLoaded', () => Audit.init());
    </script>
</body>
</html>
