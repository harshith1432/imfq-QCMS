<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standards & SOPs | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar"></aside>

        <main class="app-main">
            <header class="app-navbar" id="app-navbar"></header>

            <div class="app-content">
                <div class="content-header fade-in">
                    <h1 class="page-heading">Standards & SOPs</h1>
                    <p class="page-description">Access validated Standard Operating Procedures and organizational benchmarks.</p>
                </div>

                <div class="ds-card fade-in" style="margin-top:var(--space-6);">
                    <div class="ds-card-header d-flex justify-content-between align-items-center bg-white border-light">
                        <h5 class="card-title fw-bold">Document Library</h5>
                        <div class="ds-search-box">
                            <i data-lucide="search"></i>
                            <input type="text" class="ds-input" placeholder="Search SOPs..." id="sopSearch" onkeyup="sopLibrary.filter()">
                        </div>
                    </div>
                    <div class="ds-card-body p-0">
                        <table class="ds-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Department</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="sopTableBody">
                                <tr><td colspan="4" class="p-4 text-center text-muted">Loading standard documents...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
    const sopLibrary = {
        allSops: [],

        async init() {
            QCMS.init();
            this.loadSops();
        },

        async loadSops() {
            try {
                this.allSops = await api.get('/repository/sop-library');
                this.render(this.allSops);
            } catch (e) {
                QCMS.toast('Failed to load SOP library.', 'error');
            }
        },

        render(items) {
            const body = document.getElementById('sopTableBody');
            if (!items.length) {
                body.innerHTML = `<tr><td colspan="4">${QCMS.emptyState('file-text', 'No SOPs Found', 'Validated standards will appear here after project closure.')}</td></tr>`;
                return;
            }
            body.innerHTML = items.map(s => `
                <tr class="fade-in">
                    <td>
                        <div class="fw-semibold text-primary">${s.title}</div>
                        <div class="text-xs text-muted">Ref: SOP-${s.id}</div>
                    </td>
                    <td>${QCMS.categoryBadge(s.category || 'Quality')}</td>
                    <td><span class="text-sm">${s.department_name || 'Organization'}</span></td>
                    <td class="text-end">
                        <a href="${s.sop_path}" target="_blank" class="ds-btn ds-btn-sm ds-btn-ghost ds-btn-icon" title="View Document">
                            <i data-lucide="external-link" style="width:16px;height:16px;"></i>
                        </a>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        },

        filter() {
            const q = document.getElementById('sopSearch').value.toLowerCase();
            const filtered = this.allSops.filter(s => s.title.toLowerCase().includes(q) || (s.category || '').toLowerCase().includes(q));
            this.render(filtered);
        }
    };

    document.addEventListener('DOMContentLoaded', () => sopLibrary.init());
    </script>
</body>
</html>
