<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standards & SOPs | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="assets/js/ux/breadcrumbs.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="app-layout">
    <aside class="app-sidebar" id="app-sidebar"></aside>

    <main class="app-main">
        <header class="app-navbar" id="app-navbar"></header>

        <div class="app-content-inner">
            <header class="ds-header-layout section-spacing px-0">
                <div class="h-stack justify-content-between w-100">
                    <div class="v-stack">
                        <h1 class="ds-title mb-0">Standards & SOPs</h1>
                        <p class="ds-text-secondary mb-0">Access validated Standard Operating Procedures and organizational benchmarks.</p>
                    </div>
                </div>
            </header>

            <div class="glass-card ds-card section-spacing">
                <div class="ds-card-header h-stack justify-content-between p-4">
                    <div class="v-stack">
                        <h5 class="mb-0 fw-bold">Document Library</h5>
                        <p class="text-xs ds-text-secondary mb-0">Validated SOPs and organizational benchmarks</p>
                    </div>
                </div>
                <div class="ds-card-body p-0">
                    <div class="table-responsive">
                        <table class="ds-table ds-table-hover">
                            <thead>
                                <tr>
                                    <th>Standard Operating Procedure</th>
                                    <th>Category</th>
                                    <th>Scope</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="sopTableBody">
                                <tr><td colspan="4" class="p-5 text-center text-muted">Loading standard documents...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
    const sopLibrary = {
        allSops: [],

        async init() {
            QCMS.init();
            const searchInput = document.getElementById('globalSearchInput');
            if (searchInput) {
                searchInput.placeholder = "Search SOPs...";
                searchInput.oninput = () => this.filter();
            }
            this.loadSops();
        },

        async loadSops() {
            try {
                this.allSops = await api.get('/repository/sop-library');
                this.render(this.allSops);
            } catch (e) {
                QCMS.toast('Failed to load SOP library.', 'error');
            }
        },

        render(items) {
            const body = document.getElementById('sopTableBody');
            const q = document.getElementById('globalSearchInput')?.value || '';

            if (!items.length) {
                if (q) {
                    body.innerHTML = `<tr><td colspan="4" class="text-center p-5 text-muted">
                        <i data-lucide="search-x" class="mb-3 text-slate-400" style="width: 48px; height: 48px;"></i>
                        <p class="mb-0">No results found for "${q}"</p>
                    </td></tr>`;
                } else {
                    body.innerHTML = `<tr><td colspan="4">${QCMS.emptyState('file-text', 'No SOPs Found', 'Validated standards will appear here after project closure.')}</td></tr>`;
                }
                if (window.lucide) lucide.createIcons();
                return;
            }
            body.innerHTML = items.map(s => `
                <tr class="fade-in">
                    <td>
                        <div class="fw-semibold text-primary">${s.title}</div>
                        <div class="text-xs text-muted">Ref: SOP-${s.id}</div>
                    </td>
                    <td>${QCMS.categoryBadge(s.category || 'Quality')}</td>
                    <td><span class="text-sm">${s.department_name || 'Organization'}</span></td>
                    <td class="text-end">
                        <a href="${s.sop_path}" target="_blank" class="ds-btn ds-btn-sm ds-btn-ghost ds-btn-icon" title="View Document">
                            <i data-lucide="external-link" style="width:16px;height:16px;"></i>
                        </a>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        },

        filter() {
            const q = document.getElementById('globalSearchInput')?.value.toLowerCase() || '';
            const filtered = this.allSops.filter(s => s.title.toLowerCase().includes(q) || (s.category || '').toLowerCase().includes(q));
            this.render(filtered);
        }
    };

    document.addEventListener('DOMContentLoaded', () => sopLibrary.init());
    </script>
</body>
</html>
