<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: var(--ds-bg-mesh); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-card {
            max-width: 540px; 
            width: 100%;
            margin: 2rem;
            padding: var(--ds-space-12) !important;
        }
        .password-field-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--ds-text-tertiary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 10;
        }
        .password-toggle:hover {
            color: var(--ds-accent);
        }
        .ds-input {
            padding-right: 3rem !important;
        }
    </style>
</head>
<body class="fade-in">
    <div class="reset-card glass-card fade-in-up">
        <div class="text-center mb-5">
            <div style="width:56px;height:56px;border-radius:16px;background:rgba(var(--ds-accent-rgb), 0.1);color:var(--ds-accent);display:flex;align-items:center;justify-content:center;margin:0 auto var(--ds-space-4);border: 1px solid rgba(var(--ds-accent-rgb), 0.2);">
                <i data-lucide="shield-check" style="width:28px;height:28px;"></i>
            </div>
            <h2 class="fw-850 mb-2">Update Password</h2>
            <p class="text-muted">You are using a temporary password. Please set a new one to secure your account.</p>
        </div>

        <div id="errorMsg" class="ds-toast error mb-4" style="display:none; width: 100%; min-width: auto; animation: none;">
            <i data-lucide="alert-circle"></i>
            <span></span>
        </div>

        <form id="resetForm">
            <div class="ds-field mb-4">
                <label class="ds-label"><i data-lucide="lock" class="me-2"></i> New Password</label>
                <div class="password-field-group">
                    <input type="password" class="ds-input" id="new_password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                        <i data-lucide="eye" style="width:18px;height:18px;"></i>
                    </button>
                </div>
            </div>
            <div class="ds-field mb-4">
                <label class="ds-label"><i data-lucide="shield-check" class="me-2"></i> Confirm New Password</label>
                <div class="password-field-group">
                    <input type="password" class="ds-input" id="confirm_password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                        <i data-lucide="eye" style="width:18px;height:18px;"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="ds-btn ds-btn-primary w-100 py-3 ds-btn-lg mt-2" id="submitBtn">
                Update & Continue <i data-lucide="arrow-right" class="ms-2" style="width:18px;height:18px;"></i>
            </button>
        </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            if (window.lucide) lucide.createIcons();
        }

        // Check if there is a token in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            // Update UI for forgot password reset context
            document.querySelector('.text-muted').textContent = "Set a new password to regain access to your account.";
            document.querySelector('h3').textContent = "Reset Password";
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (newPassword !== confirm) {
                errorMsg.textContent = "Passwords do not match";
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Updating...';

            try {
                if (token) {
                    // Resetting via token (Forgot Password flow)
                    await api.post('/auth/reset-password-confirm', { 
                        token: token, 
                        new_password: newPassword 
                    });
                    window.location.href = 'login.html?reset=1';
                } else {
                    // Changing temporary password (Logged in flow)
                    await api.post('/auth/reset-password', { password: newPassword });
                    
                    // Clear all local state to force a fresh login with new password
                    localStorage.clear();
                    sessionStorage.clear();
                    
                    window.location.href = 'login.html?reset=1';
                }
            } catch (err) {
                errorMsg.textContent = err.message || "Failed to update password.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Update & Continue <i data-lucide="arrow-right" class="ms-2" style="width:16px;height:16px;"></i>';
            }
        });
    </script>
</body>
</html>
