<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-card {
            max-width: 400px; width: 100%; background: var(--bg-surface);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
            padding: var(--space-8); margin: var(--space-4);
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="text-center mb-5">
            <div style="width:48px;height:48px;border-radius:12px;background:var(--warning-100);color:var(--warning-700);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-3);">
                <i data-lucide="shield-check" style="width:24px;height:24px;"></i>
            </div>
            <h3 class="fw-bold">Update Password</h3>
            <p class="text-muted text-sm">You are using a temporary password. Please set a new one to secure your account.</p>
        </div>

        <div id="errorMsg" style="display:none;padding:12px 16px;background:var(--error-50);border:1px solid var(--error-200);border-radius:var(--radius-md);color:var(--error);font-size:0.875rem;margin-bottom:var(--space-4);"></div>

        <form id="resetForm">
            <div class="mb-4">
                <label class="ds-label">New Password</label>
                <input type="password" class="ds-input" id="new_password" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
                <label class="ds-label">Confirm New Password</label>
                <input type="password" class="ds-input" id="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="ds-btn ds-btn-primary w-100 py-2" id="submitBtn">
                Update & Continue <i data-lucide="arrow-right" class="ms-2" style="width:16px;height:16px;"></i>
            </button>
        </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (newPassword !== confirm) {
                errorMsg.textContent = "Passwords do not match";
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Updating...';

            try {
                const response = await api.post('/auth/reset-password', { password: newPassword });
                
                // Update local user state
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    user.is_temp_password = false;
                    localStorage.setItem('user', JSON.stringify(user));
                }
                
                window.location.href = 'login.html?reset=1';
            } catch (err) {
                errorMsg.textContent = err.message || "Failed to update password.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Update & Continue <i data-lucide="arrow-right" class="ms-2" style="width:16px;height:16px;"></i>';
            }
        });
    </script>
</body>
</html>
