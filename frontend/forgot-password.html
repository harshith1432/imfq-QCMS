<!DOCTYPE html>
<html lang="en">

<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: var(--ds-bg-mesh);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-card {
            max-width: 540px;
            width: 100%;
            padding: var(--ds-space-12);
            margin: 2rem;
        }
    </style>
</head>

<body class="fade-in">
    <div class="forgot-card glass-card fade-in-up">
        <div class="text-center mb-5">
            <div style="width:48px;height:48px;border-radius:12px;background:var(--ds-primary);color:white;display:flex;align-items:center;justify-content:center;margin:0 auto var(--ds-space-3);">
                <i data-lucide="key-round" style="width:24px;height:24px;"></i>
            </div>
            <h1 class="ds-display-sm text-white mb-2" style="font-weight: 850; letter-spacing: -0.04em;">Forgot Password?</h1>
            <p class="ds-text-secondary">Enter your email to receive a recovery link.</p>
        </div>

        <form id="forgotPasswordForm">
            <div class="ds-field mb-5">
                <label class="ds-label mb-2 d-block">
                    <i data-lucide="mail" class="inline-block w-4 h-4 mr-2 opacity-50"></i>
                    Email Address
                </label>
                <div class="position-relative">
                    <input type="email" id="email" class="ds-input" placeholder="name@company.com" required>
                </div>
            </div>

            <button type="submit" class="ds-btn ds-btn-primary w-100">
                Send Reset Link
            </button>

            <div id="errorMsg" class="alert alert-danger mt-3" style="display:none; background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.2); color: #ff8e8e;"></div>
            <div id="successMsg" class="alert alert-success mt-3" style="display:none; background: rgba(25, 135, 84, 0.1); border: 1px solid rgba(25, 135, 84, 0.2); color: #8eff8e;"></div>

            <div class="text-center mt-5">
                <a href="login.html" class="ds-text-secondary text-decoration-none small hover:text-white transition-all d-inline-flex align-items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Login
                </a>
            </div>
        </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // Calling the backend endpoint
                const response = await api.post('/auth/forgot-password', { email });

                successMsg.textContent = response.msg || 'Reset link sent to your email!';
                successMsg.style.display = 'block';

                // Clear input
                document.getElementById('email').value = '';
            } catch (err) {
                errorMsg.textContent = err.message || 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
