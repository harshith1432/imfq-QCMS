<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCMS - Forgot Password</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page-v2">
    <!-- Header -->
    <header class="auth-header">
        <a href="#" class="auth-logo">QCMS</a>
        <nav class="auth-nav">
            <a href="index.html#home">HOME</a>
            <a href="index.html#about">ABOUT US</a>
            <a href="index.html#contact">CONTACT</a>
            <a href="login.html" class="active">LOG IN</a>
        </nav>
    </header>

    <div class="auth-card-v2">
        <div class="auth-left">
            <form id="forgotPasswordForm">
                <h1 style="margin-bottom: 2rem; color: #2E1A47; font-weight: 700; font-size: 2.5rem;">Reset Password
                </h1>

                <p style="color: #64748b; margin-bottom: 2rem; font-size: 0.95rem;">Enter the email address associated
                    with your account and we'll send you a link to reset your password.</p>

                <div class="auth-form-group-v2">
                    <label class="auth-label-v2">Email Address</label>
                    <div class="auth-input-container-v2">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="auth-input-v2" placeholder="hello@reallygreatsite.com"
                            required>
                    </div>
                </div>

                <button type="submit" class="btn-auth-v2">Send Reset Link</button>

                <p id="errorMsg"
                    style="color: #ef4444; margin-top: 1rem; text-align: center; font-size: 0.85rem; display: none;">
                </p>
                <p id="successMsg"
                    style="color: #10b981; margin-top: 1rem; text-align: center; font-size: 0.85rem; display: none;">
                </p>

                <p class="auth-footer-text-v2">Remember your password? <a href="login.html">Log in</a></p>
            </form>
        </div>
        <div class="auth-right"></div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // Calling the backend endpoint
                const response = await api.post('/auth/forgot-password', { email });

                successMsg.textContent = response.msg || 'Reset link sent to your email!';
                successMsg.style.display = 'block';

                // Clear input
                document.getElementById('email').value = '';
            } catch (err) {
                errorMsg.textContent = err.message || 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
