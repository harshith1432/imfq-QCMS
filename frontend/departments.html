<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="assets/js/ux/breadcrumbs.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="app-layout">
    <aside class="app-sidebar" id="app-sidebar"></aside>

    <main class="app-main">
        <header class="app-navbar" id="app-navbar"></header>

        <div class="app-content-inner">
            <header class="ds-header-layout section-spacing px-0">
                <div class="h-stack justify-content-between w-100">
                    <div class="v-stack">
                        <h1 class="ds-title mb-0">Organization Units</h1>
                        <p class="ds-text-secondary mb-0">Manage standard departments and operational units across the enterprise.</p>
                    </div>
                </div>
            </header>

            <div class="glass-card ds-card mb-4">
                <div class="ds-card-header h-stack justify-content-between p-4">
                    <div class="v-stack">
                        <h5 class="mb-0 fw-bold">Active Departments</h5>
                        <p class="text-xs ds-text-secondary mb-0">Standardized operational units</p>
                    </div>
                    <button class="ds-btn ds-btn-primary ds-btn-sm" onclick="deptManager.openAddModal()">
                        <i data-lucide="plus"></i> Add Department
                    </button>
                </div>
                <div class="ds-card-body p-0">
                    <div class="table-responsive">
                        <table class="ds-table ds-table-hover">
                            <thead>
                                <tr>
                                    <th>Department Name</th>
                                    <th>Created At</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="deptTableBody">
                                <tr><td colspan="3" class="p-5 text-center text-muted">Loading departments...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="deptModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card ds-card">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add Unit</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="deptForm">
                        <input type="hidden" id="deptId">
                        <div class="ds-field">
                            <label class="ds-label">DEPARTMENT NAME</label>
                            <input type="text" class="ds-input" id="deptName" placeholder="e.g. Quality Assurance" required>
                            <p class="text-xs text-muted mt-2">Enter the formal name of the operational department.</p>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button class="ds-btn ds-btn-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button class="ds-btn ds-btn-primary px-4" onclick="deptManager.save()">Save Department</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
    const deptManager = {
        allDepts: [],

        async init() {
            try {
                if (typeof QCMS !== 'undefined') QCMS.init();
                const searchInput = document.getElementById('globalSearchInput');
                if (searchInput) {
                    searchInput.placeholder = "Search departments...";
                    searchInput.addEventListener('input', () => this.filter());
                }
                this.loadDepartments();
            } catch (e) { console.error('Init failed:', e); }
        },

        async loadDepartments() {
            try {
                this.allDepts = await api.get('/admin/departments');
                this.render(this.allDepts);
            } catch (e) {
                console.error(e);
                const body = document.getElementById('deptTableBody');
                body.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-danger">Failed to load departments.</td></tr>`;
            }
        },

        render(depts) {
            const body = document.getElementById('deptTableBody');
            const q = document.getElementById('globalSearchInput')?.value || '';

            if (!depts || !depts.length) {
                if (q) {
                    body.innerHTML = `<tr><td colspan="3" class="text-center p-5 text-muted">
                        <i data-lucide="search-x" class="mb-3 text-slate-400" style="width: 48px; height: 48px;"></i>
                        <p class="mb-0">No results found for "${q}"</p>
                    </td></tr>`;
                } else {
                    body.innerHTML = `<tr><td colspan="3">${QCMS.emptyState('building-2', 'No Departments', 'Start by adding a department to your organization.')}</td></tr>`;
                }
                if (window.lucide) lucide.createIcons();
                return;
            }
            body.innerHTML = depts.map(d => `
                <tr class="fade-in">
                    <td><div class="fw-semibold text-slate-900">${d.name}</div></td>
                    <td><span class="text-sm text-muted">${d.created_at ? QCMS.formatRelative(d.created_at) : 'Active'}</span></td>
                    <td class="text-end">
                        <div class="dropdown">
                            <button class="ds-btn ds-btn-ghost ds-btn-icon ds-btn-sm" data-bs-toggle="dropdown" data-bs-boundary="viewport">
                                <i data-lucide="more-vertical" style="width:16px;"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-light">
                                <li><a class="dropdown-item" href="#" onclick="deptManager.openEditModal(${d.id}, '${d.name.replace(/'/g, "\\'")}')"><i data-lucide="edit-2" class="me-2" style="width:14px;"></i> Rename Unit</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" onclick="deptManager.delete(${d.id})"><i data-lucide="trash-2" class="me-2" style="width:14px;"></i> Remove Dept</a></li>
                            </ul>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        },

        filter() {
            const q = document.getElementById('globalSearchInput')?.value.toLowerCase() || '';
            const filtered = this.allDepts.filter(d => d.name.toLowerCase().includes(q));
            this.render(filtered);
        },

        openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Department';
            document.getElementById('deptId').value = '';
            document.getElementById('deptName').value = '';
            new bootstrap.Modal(document.getElementById('deptModal')).show();
        },

        openEditModal(id, name) {
            document.getElementById('modalTitle').textContent = 'Edit Department';
            document.getElementById('deptId').value = id;
            document.getElementById('deptName').value = name;
            new bootstrap.Modal(document.getElementById('deptModal')).show();
        },

        async save() {
            const id = document.getElementById('deptId').value;
            const name = document.getElementById('deptName').value;
            if (!name) return QCMS.toast('Name is required', 'warning');

            try {
                if (id) {
                    await api.put(`/admin/departments/${id}`, { name });
                    QCMS.toast('Department updated.', 'success');
                } else {
                    await api.post('/admin/departments', { name });
                    QCMS.toast('Department created.', 'success');
                }
                bootstrap.Modal.getInstance(document.getElementById('deptModal')).hide();
                this.loadDepartments();
            } catch (e) {
                QCMS.toast(e.message, 'error');
            }
        },

        async delete(id) {
            if (!confirm('Are you sure you want to remove this department? This cannot be undone.')) return;
            try {
                await api.delete(`/admin/departments/${id}`);
                QCMS.toast('Department removed successfully.', 'success');
                this.loadDepartments();
            } catch (e) {
                QCMS.toast(e.message, 'error');
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => deptManager.init());
    </script>
</body>
</html>
