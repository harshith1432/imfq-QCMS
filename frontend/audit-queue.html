<!DOCTYPE html>
<html lang="en">
<head>
    <script src="assets/js/auth-guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Queue | QCMS Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="app-layout">
    <!-- Sidebar provided by components.js -->
    <aside class="app-sidebar" id="app-sidebar"></aside>

    <main class="app-main">
        <!-- Navbar provided by components.js -->
        <header class="app-navbar" id="app-navbar"></header>

        <div class="app-content-inner">
            <header class="ds-header-layout section-spacing px-0 mb-4">
                <div class="h-stack justify-content-between w-100">
                    <div class="v-stack">
                        <div class="h-stack gap-2 mb-1">
                            <span class="ds-badge orange text-xs">Stage 7 Review</span>
                        </div>
                        <h1 class="ds-title mb-0">Audit & Validation Queue</h1>
                        <p class="ds-text-secondary mb-0">Review project transitions and authorize Stage 8 implementation.</p>
                    </div>
                </div>
            </header>

            <!-- Stats Row -->
            <div class="row g-4 mb-4">
                <div class="col-md-6 col-lg-3">
                    <div id="kpi-pending-audits">
                        <div class="glass-card ds-card p-4 skeleton-card">
                            <div class="skeleton-text skeleton mb-2" style="width: 40%"></div>
                            <div class="skeleton-text skeleton" style="width: 60%; height: 2rem;"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div id="kpi-avg-review">
                        <div class="glass-card ds-card p-4 skeleton-card">
                            <div class="skeleton-text skeleton mb-2" style="width: 40%"></div>
                            <div class="skeleton-text skeleton" style="width: 50%; height: 2rem;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search & Actions -->
            <div class="glass-card ds-card p-3 mb-4 d-flex justify-content-between align-items-center">
                <div class="h-stack gap-3 flex-grow-1">
                    <div class="ds-search-inline" style="max-width: 400px; width: 100%;">
                        <i data-lucide="search" class="text-muted"></i>
                        <input type="text" class="ds-input" placeholder="Quick filter audits..." id="localSearch">
                    </div>
                </div>
                <div class="h-stack gap-2">
                    <button class="ds-btn ds-btn-ghost py-2" onclick="reviewer.fetchAuditQueue()">
                        <i data-lucide="refresh-cw" style="width:16px; height:16px;"></i>
                    </button>
                </div>
            </div>

            <!-- Queue List -->
            <div class="v-stack gap-3" id="auditQueueList">
                <!-- Data loaded via reviewer.js -->
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content glass-modal border-0 overflow-hidden" style="border-radius: 24px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="modal-title fw-bold">Project Audit Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="proposalDetailView">
                        <!-- Dynamic content -->
                    </div>
                    
                    <hr class="my-4 opacity-10">
                    
                    <div class="review-action-section">
                        <label class="ds-label mb-2">Reviewer Comments</label>
                        <textarea id="reviewerComments" class="ds-input mb-3" rows="3" placeholder="Provide detailed feedback or reasons for the decision..."></textarea>
                        
                        <div class="h-stack justify-content-end gap-3">
                            <button class="ds-btn ds-btn-ghost text-danger" onclick="reviewer.submitDecision('Rejected')">
                                <i data-lucide="x-circle" class="me-2 text-sm"></i> Reject
                            </button>
                            <button class="ds-btn ds-btn-ghost text-orange" onclick="reviewer.submitDecision('Revision')">
                                <i data-lucide="rotate-ccw" class="me-2 text-sm"></i> Request Revision
                            </button>
                            <button class="ds-btn ds-btn-primary" id="btn-approve" onclick="reviewer.submitDecision('Approved')">
                                <i data-lucide="check-circle" class="me-2 text-sm"></i> Approve Transition
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/reviewer.js"></script>
    <script>
        document.getElementById('localSearch')?.addEventListener('input', (e) => {
            reviewer.filterAuditQueue(e.target.value);
        });
    </script>
</body>
</html>
